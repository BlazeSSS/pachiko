<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 柏青哥 - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #1a1a2e;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        /* UI 覆盖层 */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        /* 分数板 */
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
        }
        #score-board div {
            margin: 5px 0;
        }
        #score-value {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }
        #balls-value {
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
        }
        /* 蓄力条容器 */
        #power-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            text-align: center;
        }
        #power-label {
            color: #fff;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #power-bar-bg {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #fff;
        }
        #power-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #ffff00, #ff4444);
            transition: width 0.05s linear;
        }
        /* 发射按钮提示 */
        #launch-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
        }
        /* 游戏结束弹窗 */
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
        }
        #game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        #final-score {
            font-size: 48px;
            color: #00ff88;
            margin-bottom: 30px;
        }
        #restart-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.05);
        }
        /* 控制说明 */
        #controls-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #aaa;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas-container"></div>
        <div id="ui-overlay">
            <div id="score-board">
                <div>得分：<span id="score-value">0</span></div>
                <div>剩余球：<span id="balls-value">20</span></div>
            </div>
            <div id="controls-hint">
                按住 SPACE 蓄力<br>
                松开 SPACE 发射
            </div>
            <div id="power-container">
                <div id="power-label">发射力度</div>
                <div id="power-bar-bg">
                    <div id="power-bar-fill"></div>
                </div>
            </div>
            <div id="launch-hint">按住空格键蓄力，松开射击钢珠</div>
            <div id="game-over">
                <h2>游戏结束!</h2>
                <div id="final-score">0</div>
                <button id="restart-btn">重新开始</button>
            </div>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <!-- 引入 Rapier Physics -->
    <script src="https://cdn.jsdelivr.net/npm/@dimforge/rapier3d@0.11.2/dist/rapier3d.umd.min.js"></script>
    
    <!-- 游戏模块 -->
    <script src="src/physics.js"></script>
    <script src="src/ui.js"></script>
    <script src="src/game.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
